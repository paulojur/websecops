services:
  db:
    image: postgres:16-alpine
    container_name: cyber_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cyberadmin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-securepassword}
      POSTGRES_DB: ${POSTGRES_DB:-cyberintel}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: cyber_redis
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cyber_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-cyberadmin}:${POSTGRES_PASSWORD:-securepassword}@db:5432/${POSTGRES_DB:-cyberintel}
      REDIS_URL: redis://redis:6379/0
      ZAP_URL: http://zap:8080
    depends_on:
      - db
      - redis
    ports:
      - "8001:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://165.245.211.205:8001}
    container_name: cyber_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:3000"

  zap:
    image: zaproxy/zap-bare:latest
    container_name: cyber_zap
    restart: unless-stopped
    profiles:
      - scan
    command: >
      zap.sh -daemon -host 0.0.0.0 -port 8080
      -config api.disablekey=true
      -config api.addrs.addr.name=.*
      -config api.addrs.addr.regex=true

volumes:
  postgres_data:
