version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: cyber_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cyberadmin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-securepassword}
      POSTGRES_DB: ${POSTGRES_DB:-cyberintel}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: cyber_redis
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cyber_backend
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-cyberadmin}:${POSTGRES_PASSWORD:-securepassword}@db:5432/${POSTGRES_DB:-cyberintel}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: cyber_frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend

  zap:
    image: zaproxy/zap-stable
    container_name: cyber_zap
    command: zap.sh -daemon -host 0.0.0.0 -port 8080 -config api.addrs.addr.name=.* -config api.addrs.addr.regex=true -config api.key=secret_api_key
    ports:
      - "8080:8080"
    volumes:
      - zap_data:/zap/wrk/

volumes:
  postgres_data:
  zap_data:
