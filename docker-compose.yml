version: '3.8'

services:
  db:
    image: docker.io/library/postgres:16-alpine
    container_name: cyber_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cyberadmin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-securepassword}
      POSTGRES_DB: ${POSTGRES_DB:-cyberintel}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  redis:
    image: docker.io/library/redis:alpine
    container_name: cyber_redis
    ports:
      - "6379:6379"
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 128M

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cyber_backend
    restart: always
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-cyberadmin}:${POSTGRES_PASSWORD:-securepassword}@db:5432/${POSTGRES_DB:-cyberintel}
      - REDIS_URL=redis://redis:6379/0
      - ZAP_URL=http://host.docker.internal:8080
    depends_on:
      db:
        condition: service_started
      redis:
        condition: service_started
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: cyber_frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    # Frontend consumes a lot during dev, better run locally, but if running in docker:
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

volumes:
  postgres_data:
